name: Dependabot patch auto-merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    name: Evaluate Dependabot update
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.repository == 'futureproofmusicschool/vst-plugin-builder'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch verified Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98  # v3.1.0

      - name: Enable squash auto-merge for patch updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"

      - name: Leave larger updates for human review
        if: steps.metadata.outputs.update-type != 'version-update:semver-patch'
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        run: echo "${UPDATE_TYPE} updates require human review"
