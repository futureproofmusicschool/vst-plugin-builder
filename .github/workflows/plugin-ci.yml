name: Plugin CI

on:
  pull_request:
    paths:
      - 'plugins/**'
      - 'JUCE/**'
      - 'templates/**'
      - 'rules/juce-patterns.md'
      - '.github/workflows/plugin-ci.yml'
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'JUCE/**'
      - 'templates/**'
      - 'rules/juce-patterns.md'
      - '.github/workflows/plugin-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: plugin-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    name: Discover plugin projects
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.plugins.outputs.json }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Build plugin matrix
        id: plugins
        shell: bash
        run: |
          set -euo pipefail
          json=$(find plugins -mindepth 2 -maxdepth 2 -name CMakeLists.txt -print \
            | sed -E 's#^plugins/([^/]+)/CMakeLists.txt$#\1#' \
            | sort \
            | jq -Rsc 'split("\n") | map(select(length > 0))')
          test "$json" != "[]" || { echo "::error::No plugin projects found"; exit 1; }
          echo "json=$json" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.plugin }} (macOS)
    needs: discover
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJSON(needs.discover.outputs.plugins) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          submodules: recursive

      - name: Configure, build, and test plugin
        shell: bash
        run: |
          set -euo pipefail
          plugin_dir="plugins/${{ matrix.plugin }}"
          build_dir="$RUNNER_TEMP/${{ matrix.plugin }}-build"

          cmake -S "$plugin_dir" -B "$build_dir" -DCMAKE_BUILD_TYPE=Release
          cmake --build "$build_dir" --config Release --parallel 2

          if test -f "$plugin_dir/tests/CMakeLists.txt"; then
            ctest --test-dir "$build_dir" --build-config Release --output-on-failure
          fi

  result:
    name: Plugin CI
    if: always()
    needs: [discover, build]
    runs-on: ubuntu-latest
    steps:
      - name: Confirm every plugin passed
        env:
          DISCOVER_RESULT: ${{ needs.discover.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          test "$DISCOVER_RESULT" = success
          test "$BUILD_RESULT" = success
