name: Repository maintenance

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '23 16 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: maintenance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    name: Repository checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Verify required project files
        shell: bash
        run: |
          set -euo pipefail
          for file in README.md LICENSE CONTRIBUTING.md SECURITY.md .github/dependabot.yml; do
            test -f "$file" || { echo "::error file=$file::Required project file is missing"; exit 1; }
          done

      - name: Reject tracked build products and secrets
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -E '^plugins/[^/]+/(build|installer)/|(^|/)\.env($|\.)'; then
            echo "::error::Tracked build products, installer output, or environment files found"
            exit 1
          fi

      - name: Validate plugin status JSON
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            jq empty "$file"
          done < <(find plugins -name status.json -type f -print0)

  mcp:
    name: MCP server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .mcp-servers/juce-docs/juce-docs-mcp-server
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: .mcp-servers/juce-docs/juce-docs-mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: End-to-end test
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: high
